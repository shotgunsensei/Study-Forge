kind = "web"
previewPath = "/"
title = "StudyForge AI"
version = "1.0.0"
id = "artifacts/studyforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19683

[services.development]
run = "pnpm --filter @workspace/studyforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studyforge", "run", "build" ]
publicDir = "artifacts/studyforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19683"
BASE_PATH = "/"
